spring.application.name=fdl
# 기본적으로 local 프로파일(application-local.properties)을 활성화합니다.
spring.profiles.active=local

# =====================================================================
# 아래 설정들은 로컬 실행 시 application-local.properties 에서 구동되므로
# 기본 파일에서는 가이드라인 주석으로만 관리합니다.
# =====================================================================

# database PostgreSQL
# 데이터베이스 연결 시 타임존을 아시아/서울로 고정
# spring.datasource.url=jdbc:postgresql://<DB_HOST>:<DB_PORT>/<DB_NAME>?serverTimezone=Asia/Seoul
# spring.datasource.username=<DB_USERNAME>
# spring.datasource.password=<DB_PASSWORD>
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
